name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install

      - run: pnpm lint

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with: { enable-cache: true }

      - run: uvx ruff check backend/

      - name: Deps parity (pyproject <-> requirements)
        run: python3 scripts/sync_deps.py --check
        working-directory: backend

  backend-bdd:
    name: Backend BDD (pytest-bdd)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
      BASE: http://localhost:8000
      GROQ_API_KEY: dummy-ci-key-not-used-by-bdd-tests
      OPENROUTER_API_KEY: dummy-ci-key-not-used-by-bdd-tests
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Install backend deps
        run: uv pip install --system -r requirements-dev.txt
        working-directory: backend

      - name: Start backend
        run: uvicorn main:app --port 8000 > /tmp/backend.log 2>&1 &
        working-directory: backend

      - name: Wait for backend
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:8000/health && echo "backend ready" && exit 0
            echo "waiting... ($i/40)"
            sleep 5
          done
          echo "=== Backend failed to start — startup log ==="
          cat /tmp/backend.log
          exit 1

      - name: Run BDD step defs + unit
        run: pytest tests/step_defs/ tests/test_llm_config_store.py -v --tb=short
        working-directory: backend

  frontend-unit:
    name: Frontend Unit BDD (cucumber-js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install

      - run: pnpm test:unit

  e2e:
    name: E2E BDD (playwright-bdd)
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend, backend-bdd, frontend-unit]
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
      BASE_URL: http://localhost:5173
      GROQ_API_KEY: dummy-ci-key-not-used-by-bdd-tests
      OPENROUTER_API_KEY: dummy-ci-key-not-used-by-bdd-tests
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('tests/package.json') }}
          restore-keys: playwright-chromium-

      - run: pnpm --filter genova-tests exec playwright install --with-deps chromium

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Install backend deps
        run: uv pip install --system -r requirements-dev.txt
        working-directory: backend

      - name: Start backend
        run: uvicorn main:app --port 8000 > /tmp/backend.log 2>&1 &
        working-directory: backend

      - name: Wait for backend
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:8000/health && echo "backend ready" && exit 0
            echo "waiting... ($i/40)"
            sleep 5
          done
          echo "=== Backend failed to start — startup log ==="
          cat /tmp/backend.log
          exit 1

      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/playwright-report
