name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install

      - run: pnpm lint

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - run: pip install ruff && ruff check backend/

  backend-bdd:
    name: Backend BDD (pytest-bdd)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
      BASE: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install backend deps
        run: pip install -r backend/requirements-dev.txt
        working-directory: .

      - name: Start backend
        run: uvicorn main:app --port 8000 &
        working-directory: backend

      - name: Wait for backend
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - name: Run BDD step defs
        run: pytest backend/tests/step_defs/ -v --tb=short -m bdd
        working-directory: .

  frontend-unit:
    name: Frontend Unit BDD (cucumber-js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install

      - run: pnpm test:unit

  e2e:
    name: E2E BDD (playwright-bdd)
    runs-on: ubuntu-latest
    needs: [backend-bdd, frontend-unit]
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
      BASE_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install

      - run: pnpm exec playwright install --with-deps chromium

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install backend deps
        run: pip install -r backend/requirements-dev.txt

      - name: Start backend
        run: uvicorn main:app --port 8000 &
        working-directory: backend

      - name: Wait for backend
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/playwright-report/
