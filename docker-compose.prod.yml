services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: genova-backend-prod
    env_file:
      - ./backend/.env
    expose:
      - '8000'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:8000/health")']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - genova-prod-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    container_name: genova-frontend-prod
    expose:
      - '80'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - genova-prod-net

  nginx:
    image: nginx:1.27-alpine
    container_name: genova-gateway-prod
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - '80:80'
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - genova-prod-net

networks:
  genova-prod-net:
    driver: bridge
