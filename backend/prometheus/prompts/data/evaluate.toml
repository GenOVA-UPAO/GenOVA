[texto.1]
defaults = { num_questions = 6 }
template = '''
[ROL] Diseniador de quizzes educativos de ML.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] Quiz de ${num_questions} preguntas sobre "${concept}": enunciado <=40 palabras, 4 opciones (A/B/C/D), respuesta_correcta, feedback_correcto e incorrecto <=20 palabras. Dificultad progresiva.
[RESTRICCIONES] Opciones plausibles. Feedback que ensenie, no solo indique error.
[SALIDA] JSON puro con clave "preguntas": array de ${num_questions} con "enunciado","opciones","correcta","feedback_correcto","feedback_incorrecto".'''

[texto.2]
defaults = { num_criteria = 5 }
template = '''
[ROL] Diseniador de rubricas de autoevaluacion para ML.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] Rubrica con ${num_criteria} criterios sobre "${concept}". Cada uno: descripcion <=25 palabras, 3 niveles (inicial/en desarrollo/logrado) con descriptor <=30 palabras. Puntuacion 1-3. Reflexion final segun rango de puntaje.
[RESTRICCIONES] Criterios auto-evaluables. Descriptores en primera persona ("Puedo...").
[SALIDA] JSON puro con claves "criterios" (array de ${num_criteria}) y "reflexiones" (objeto con rangos).'''

[texto.4]
defaults = { num_questions = 8 }
template = '''
[ROL] Examinador de conceptos de Machine Learning.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] Examen de ${num_questions} preguntas opcion multiple sobre "${concept}": enunciado <=40 palabras, 4 opciones, justificacion <=30 palabras. Distribucion balanceada entre conceptual, aplicacion, analisis y relacion.
[RESTRICCIONES] Sin ambiguedades. Distractores verosimiles. Una sola correcta.
[SALIDA] JSON puro con clave "examen": array de ${num_questions} con "numero","enunciado","opciones","correcta","justificacion","tipo".'''

[texto.6]
defaults = { num_pairs = 6 }
template = '''
[ROL] Diseniador de ejercicios de asociacion conceptual.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] ${num_pairs} parejas: columna A (definiciones), columna B (terminos de "${concept}"). Relacion 1:1. Cada pareja: feedback_acierto <=20 palabras, feedback_error <=20 palabras (pista sin revelar).
[RESTRICCIONES] Sin ambiguedad. Terminos y definiciones precisos. Sin pistas en la redaccion.
[SALIDA] JSON puro con claves "columna_a" (array de ${num_pairs}) y "parejas" (array de ${num_pairs} con a_index,b_termino,feedback_acierto,feedback_error).'''

[texto.7]
defaults = { num_terms = 8 }
template = '''
[ROL] Creador de crucigramas educativos de ML.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] Crucigrama de ${num_terms} terminos de "${concept}": numero, orientacion, longitud, pista <=25 palabras, respuesta. Cuadricula interconectada (>=4 cruces). Pistas ingeniosas pero justas.
[RESTRICCIONES] Terminos reales. Sin abreviaturas.
[SALIDA] JSON puro con clave "entradas": array de ${num_terms} con "numero","orientacion","longitud","pista","respuesta".'''

[texto.8]
defaults = { num_questions = 3 }
template = '''
[ROL] Evaluador de comprension profunda de ML.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] ${num_questions} preguntas de desarrollo sobre "${concept}": enunciado <=50 palabras (abierto), 3-4 criterios de evaluacion observables, respuesta_modelo <=80 palabras.
[RESTRICCIONES] No respondibles con si/no. Criterios evaluables objetivamente.
[SALIDA] JSON puro con clave "preguntas": array de ${num_questions} con "enunciado","criterios","respuesta_modelo".'''

[texto.10]
defaults = { num_competencias = 3 }
template = '''
[ROL] Diseniador de diplomas y certificados educativos.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] Diploma de logro por "${concept}": titulo <=20 palabras, descripcion_logro <=50 palabras, ${num_competencias} competencias_adquiridas, firma_simulada, diseno_sugerido (paleta, iconos, tipografia).
[RESTRICCIONES] Tono celebratorio profesional. Competencias medibles y reales.
[SALIDA] JSON puro con claves "titulo","descripcion_logro","competencias" (array de ${num_competencias}),"firma","diseno_sugerido".'''

[codigo.3]
defaults = { time_seconds = 90, num_questions = 8 }
template = '''
[ROL] Desarrollador front-end de desafios cronometrados educativos.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[OBJETIVO] Desafio contrarreloj HTML5 que evalue dominio de "${concept}" bajo presion de tiempo.
[TAREA] Cronometro regresivo ${time_seconds} s visible, ${num_questions} preguntas secuenciales de opcion multiple sobre "${concept}", puntuacion con bonus por velocidad, barra de progreso, pantalla final con puntaje y feedback por pregunta. Cronometro real setInterval.
[REQUISITOS] HTML5+JS autocontenido. Minimo 300 lineas.
${ds}
[SCORM] Al final del <script>: ${scorm}. Llama _scormComplete(puntaje_final) al terminar.
[SALIDA] Solo el HTML completo desde <!DOCTYPE html>, sin markdown.'''

[codigo.5]
defaults = { num_sentences = 8 }
template = '''
[ROL] Desarrollador front-end de ejercicios de completar espacios.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[OBJETIVO] Ejercicio HTML5 de completar espacios que evalue vocabulario de "${concept}".
[TAREA] ${num_sentences} oraciones sobre "${concept}" con espacio en blanco, validacion flexible (ignora mayusculas/acentos), feedback inmediato con correccion, barra de progreso, puntaje y boton "Reintentar". Validacion JS real.
[REQUISITOS] HTML5+JS autocontenido. Minimo 280 lineas.
${ds}
[SCORM] Al final del <script>: ${scorm}. Llama _scormComplete(puntaje_final) al completar.
[SALIDA] Solo el HTML completo desde <!DOCTYPE html>, sin markdown.'''

[codigo.9]
defaults = { num_decisions = 3 }
template = '''
[ROL] Desarrollador front-end de simulaciones evaluativas.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[OBJETIVO] Simulacion evaluativa HTML5 donde el estudiante demuestre dominio practico de "${concept}".
[TAREA] Escenario profesional concreto, ${num_decisions}-${num_decisions_plus1} decisiones evaluables mediante controles interactivos, evaluacion contra criterios objetivos de "${concept}", puntuacion con pesos, reporte final con fortalezas y areas de mejora.
[REQUISITOS] HTML5+JS autocontenido. Minimo 320 lineas. Evaluacion real basada en criterios.
${ds}
[SCORM] Al final del <script>: ${scorm}. Llama _scormComplete(puntaje_final) al finalizar.
[SALIDA] Solo el HTML completo desde <!DOCTYPE html>, sin markdown.'''

[html]
estilo_default = 'pagina educativa interactiva moderna'
template = '''
[ROL] Desarrollador front-end experto en recursos educativos interactivos.
[CURSO] ${curso}
[OBJETIVO] Construir un recurso HTML5 de la fase EVALUATE sobre "${concept}" que evalue el aprendizaje.
[DATOS] Usa exactamente este contenido, sin inventar ni omitir datos:
${data_json}
[FORMATO] ${estilo}
[REQUISITOS] HTML5 autocontenido: CSS en <style>, JS en <script>. Minimo 300 lineas de calidad. Evaluacion con puntuacion, feedback, navegacion y resultados funcionales. Paleta evaluativa clara.
${ds}
[SCORM] Al final del <script>: ${scorm}. Llama _scormComplete(puntaje) al finalizar.
[SALIDA] Solo el documento HTML completo desde <!DOCTYPE html>, sin markdown.'''

[html.estilos]
1 = 'quiz interactivo: preguntas secuenciales con botones de opcion, feedback animado, barra de progreso, pantalla de resultados con repaso'
2 = 'rubrica interactiva: tabla de criterios con niveles seleccionables, puntuacion automatica, reflexion segun rango, disenio formulario'
4 = 'examen formal: preguntas numeradas radiales, navegacion entre preguntas, pantalla de entrega con puntaje y revision'
6 = 'relacionar conceptos: 2 columnas (definiciones + terminos arrastrables), conexiones visuales, contador de aciertos, feedback por pareja'
7 = 'crucigrama interactivo: cuadricula SVG, teclado en pantalla, pistas laterales que se iluminan al completar, animacion de completado'
8 = "preguntas de desarrollo: enunciados con campo expandible, criterios como checklist, respuesta modelo oculta tras boton 'Comparar'"
10 = 'diploma de logro: certificado estilizado con borde SVG, concepto destacado, competencias en lista, paleta dorada/azul, boton descargar'
