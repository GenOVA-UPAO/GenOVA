[texto.1]
defaults = { num_questions = 4 }
template = '''
[ROL] Redactor de casos de estudio para ciencias de datos.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] Caso de estudio: narrativa 180 palabras (empresa ficticia, problema concreto, datos), ${num_questions} preguntas progresivas (observar->diagnosticar->proponer->evaluar), respuesta_modelo <=50 palabras cada una con razonamiento.
[RESTRICCIONES] Sector reconocible. Datos plausibles. Preguntas que guien razonamiento.
[SALIDA] JSON puro con claves "narrativa","preguntas" (array de ${num_questions} con pregunta,respuesta_modelo).'''

[texto.2]
defaults = { num_steps = 5 }
template = '''
[ROL] Instructor de ejercicios practicos de ML.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] Ejercicio guiado de ${num_steps} pasos para aplicar "${concept}". Cada paso: instruccion <=35 palabras, pista opcional, resultado_esperado, validacion de logro.
[RESTRICCIONES] Pasos incrementales, sin saltos logicos. Completables sin frustracion.
[SALIDA] JSON puro con clave "pasos": array de ${num_steps} objetos con "numero","instruccion","pista","resultado_esperado","validacion".'''

[texto.3]
defaults = { num_deliverables = 3 }
template = '''
[ROL] Diseniador de mini-proyectos de ML aplicado.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] Mini-proyecto: objetivo 50 palabras, ${num_deliverables} entregables evaluables, dataset_sugerido 80 palabras (al menos 8 variables, 50 registros), rubrica con 4 criterios y 3 niveles cada uno (basico/competente/avanzado).
[RESTRICCIONES] Entregables en 8-10 min. Dataset realista y descriptivo.
[SALIDA] JSON puro con claves "objetivo","entregables" (array de ${num_deliverables}),"dataset_sugerido","rubrica".'''

[texto.6]
defaults = { num_decisions = 3 }
template = '''
[ROL] Diseniador de escenarios de decision ramificados.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] Escenario ramificado de ${num_decisions} niveles aplicando "${concept}". Nivel 1: situacion 60 palabras + 2 opciones -> cada una lleva al siguiente nivel con nueva situacion + 2 opciones. Cada rama final: desenlace 40 palabras + leccion_aprendida conectada con "${concept}".
[RESTRICCIONES] Decisiones no triviales. Todas las ramas pedagogicamente valiosas.
[SALIDA] JSON puro con estructura de arbol: "nodo_raiz" con situacion,opciones (array de 2 con siguiente_nodo,desenlace,leccion_aprendida).'''

[texto.8]
defaults = { num_problems = 4 }
template = '''
[ROL] Facilitador de resolucion de problemas de ML.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] Mapa de ${num_problems} problemas donde "${concept}" es la solucion. Cada uno: contexto 40 palabras (sector+situacion), 3 sintomas observables, diagnostico (por que "${concept}"), solucion_recomendada 50 palabras.
[RESTRICCIONES] Sectores diversos (salud, finanzas, retail, industria). Sintomas sin jerga experta.
[SALIDA] JSON puro con clave "problemas": array de ${num_problems} con "contexto","sintomas" (array de 3),"diagnostico","solucion_recomendada".'''

[texto.10]
defaults = { num_criteria = 4 }
template = '''
[ROL] Diseniador de retos de arquitectura de soluciones ML.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[TAREA] Reto de disenio: enunciado 80 palabras (cliente realista, problema, restricciones), ${num_criteria} criterios de disenio, guia_evaluacion con 3 niveles, solucion_referencia 100 palabras.
[RESTRICCIONES] Fuerza trade-offs reales de "${concept}". Sin respuesta unica obvia.
[SALIDA] JSON puro con claves "enunciado","criterios" (array de ${num_criteria}),"guia_evaluacion","solucion_referencia".'''

[codigo.4]
defaults = { num_params = 3 }
template = '''
[ROL] Desarrollador front-end de simulaciones aplicadas interactivas.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[OBJETIVO] Simulacion HTML5 donde el estudiante aplique "${concept}" en un escenario realista.
[TAREA] Entorno simulado con escenario empresarial concreto, ${num_params}-${num_params_plus1} parametros ajustables, visualizacion SVG/canvas reactiva, metricas visibles y boton "Aplicar" que ejecuta "${concept}". Iterar al menos 3 veces para descubrir patrones.
[REQUISITOS] HTML5+JS autocontenido. Minimo 300 lineas. Visualizacion <100 ms.
${ds}
[SCORM] Al final del <script>: ${scorm}. Llama _scormComplete() tras 3 iteraciones.
[SALIDA] Solo el HTML completo desde <!DOCTYPE html>, sin markdown.'''

[codigo.5]
defaults = { num_questions = 3 }
template = '''
[ROL] Desarrollador front-end de dashboards de analisis de datos.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[OBJETIVO] Dashboard HTML5 donde el estudiante analice datos de "${concept}" y extraiga conclusiones.
[TAREA] Dataset hardcodeado de 15-20 registros, tabla filtrable/ordenable, 2 graficos SVG (scatter/bar/line) que reaccionan a filtros, ${num_questions} preguntas con selector, boton "Revelar insight". Graficos SVG reales.
[REQUISITOS] HTML5+JS autocontenido. Minimo 300 lineas.
${ds}
[SCORM] Al final del <script>: ${scorm}. Llama _scormComplete() al responder las ${num_questions} preguntas.
[SALIDA] Solo el HTML completo desde <!DOCTYPE html>, sin markdown.'''

[codigo.7]
defaults = { num_exercises = 3 }
template = '''
[ROL] Desarrollador front-end de laboratorios de codigo interactivo.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[OBJETIVO] Lab de codigo HTML5 donde el estudiante experimente con "${concept}" escribiendo pseudocodigo.
[TAREA] Editor simplificado (textarea), ${num_exercises} ejercicios crecientes sobre "${concept}" con codigo inicial incompleto, boton "Ejecutar" que valida contra solucion esperada, feedback visual, "Ver solucion" tras 2 intentos. Validacion JS real.
[REQUISITOS] HTML5+JS autocontenido. Minimo 320 lineas.
${ds}
[SCORM] Al final del <script>: ${scorm}. Llama _scormComplete() al completar los ${num_exercises} ejercicios.
[SALIDA] Solo el HTML completo desde <!DOCTYPE html>, sin markdown.'''

[codigo.9]
defaults = { num_turns = 6 }
template = '''
[ROL] Desarrollador front-end de juegos de estrategia educativos.
[CURSO] ${curso}
[CONCEPTO] "${concept}"
[OBJETIVO] Juego de estrategia HTML5 por turnos que modele la logica de "${concept}" como mecanica.
[TAREA] Tablero/escenario con ${num_turns} turnos de decision, oponente automatico basado en "${concept}", puntuacion que refleje calidad de decisiones, pantalla final con analisis y consejos. IA oponente funcional.
[REQUISITOS] HTML5+JS autocontenido. Minimo 320 lineas.
${ds}
[SCORM] Al final del <script>: ${scorm}. Llama _scormComplete() al terminar la partida.
[SALIDA] Solo el HTML completo desde <!DOCTYPE html>, sin markdown.'''

[html]
estilo_default = 'pagina educativa interactiva moderna'
template = '''
[ROL] Desarrollador front-end experto en recursos educativos interactivos.
[CURSO] ${curso}
[OBJETIVO] Construir un recurso HTML5 de la fase ELABORATE sobre "${concept}" para aplicar y practicar.
[DATOS] Usa exactamente este contenido, sin inventar ni omitir datos:
${data_json}
[FORMATO] ${estilo}
[REQUISITOS] HTML5 autocontenido: CSS en <style>, JS en <script>. Minimo 300 lineas de calidad. Checklists, revelaciones, navegacion y feedback funcionales. Paleta con acentos de accion.
${ds}
[SCORM] Al final del <script>: ${scorm}. Llama _scormComplete() al completar la actividad principal.
[SALIDA] Solo el documento HTML completo desde <!DOCTYPE html>, sin markdown.'''

[html.estilos]
1 = 'estudio de caso: narrativa destacada, preguntas secuenciales con campo de respuesta y toggle de modelo, barra de progreso, disenio periodistico'
2 = 'ejercicio guiado: pasos numerados, cada uno expandible con pista y validacion, indicador de paso actual, boton siguiente'
3 = 'mini-proyecto: panel de objetivo, tarjetas de entregables con checklist, dataset colapsable, rubrica interactiva con niveles desplegables'
6 = 'escenario ramificado: tarjeta de situacion con 2 botones, transicion animada entre niveles, desenlace con leccion destacada'
8 = 'mapa de problemas: grid de 4 tarjetas por sector, expandibles con sintomas+diagnostico+solucion, iconos coloreados'
10 = 'reto de disenio: enunciado en panel, criterios en checklist, rubrica en acordeon, solucion oculta tras boton con delay'
