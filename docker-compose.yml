services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genova-backend-dev
    env_file:
      - ./backend/.env
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:8000/health")']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - genova-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: genova-frontend-dev
    depends_on:
      backend:
        condition: service_healthy
    command: sh -c "pnpm install --no-frozen-lockfile && pnpm dev --host 0.0.0.0 --port 5173"
    ports:
      - '5173:5173'
    environment:
      - CI=true
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:5173']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - genova-net

networks:
  genova-net:
    driver: bridge
